services:
  mongo:
    image: mongo:7.0.2
    command: --replSet rs0
    # volumes:
    #   - ./data/db:/data/db
    ports:
      - "27017:27017"
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 256m
  mongosetup:
    image: mongo:7.0.2
    depends_on:
      - mongo
    volumes:
      - ./init:/scripts
      # - ./data/init:/data/db
    restart: "no"
    entrypoint: ["bash", "/scripts/mongo_setup.sh"]
